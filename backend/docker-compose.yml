version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aitrms-postgres
    environment:
      POSTGRES_USER: aitrms_user
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: aitrms
    ports:
      - "5432:5432"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitrms_user -d aitrms"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
